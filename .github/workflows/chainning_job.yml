name: Chainning Jobs Example
on:
  workflow_dispatch:
    inputs:
      run_job_3:
       type: boolean
       default: false
       description: 'Run Job 3'
jobs:
  job_1:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 in Job 1
        run: echo "This is Job 1, Step 1"
     
  
  job_2:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - name: Step 1 in Job 2
        run: echo "This is Job 2, Step 1"
      - name: fail in job 2
        run: exit 1
        
  job_3:
    runs-on: ubuntu-latest
    needs: job_1
    if: github.event.inputs.run_job_3 == 'true'
    steps:
      - name: Step 1 in Job 3
        run: echo "This is Job 3, Step 1"
  
  job_4:
    runs-on: ubuntu-latest
    needs: [job_2, job_3]
    # if: always() # Uncomment this line if you want Job 4 to run regardless of the outcome of Job 2 and Job 3
    steps:
      - name: Step 1 in Job 4
        run: echo "This is Job 4, Step 1, which runs after Job 2 and Job 3"

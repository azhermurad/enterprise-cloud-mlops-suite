name: CI - Training and Saving of traditional machine learning model

# When Should It Run?
on:
  push:
    branches: [ main ]
    paths:
      - 'traditional_ml_deployment_pipeLine/**'
  workflow_dispatch:
  
  pull_request:
    branches: [ "main" ]
    paths:
      - 'traditional_ml_deployment_pipeLine/**'

jobs:
  trainSave:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12','3.12.4' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: python --version
      - name: Install dependencies 
        run: |
          python -m pip install --upgrade pip
          pip install -r traditional_ml_deployment_pipeLine/requirements.txt
      - name: run train file    
        run: python train.py 
    



















